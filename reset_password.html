<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedFuse - Set New Password</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div class="navbar">
        <h1><i class="fa-solid fa-brain" style="color: #06b6d4; margin-right: 8px;"></i>MedFuse</h1>
    </div>

    <div class="auth-container">
        <div class="auth-card">
            <h2 style="color: var(--primary-color);">Set New Password</h2>
            <p style="color: #64748b; margin-bottom: 1.5rem; font-size: 0.95rem;">Please securely enter your new
                password below.</p>

            <form id="resetConfirmForm">
                <div class="form-group">
                    <label for="newPassword">New Password</label>
                    <input type="password" id="newPassword" class="form-input" required>
                </div>
                <div class="form-group">
                    <label for="confirmPassword">Confirm New Password</label>
                    <input type="password" id="confirmPassword" class="form-input" required>
                </div>
                <button type="submit" class="btn">Update Password</button>
            </form>
            <p id="resetMessage" style="margin-top: 1rem; font-weight: 500;"></p>
            <a href="login.html" class="auth-link">Back to Login</a>
        </div>
    </div>

    <script>
        document.getElementById('resetConfirmForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const messageEl = document.getElementById('resetMessage');

            if (newPassword !== confirmPassword) {
                messageEl.style.color = 'var(--error)';
                messageEl.innerText = "Passwords do not match.";
                return;
            }

            // Extract the token off the end of the URL generated by the email
            const urlParams = new URLSearchParams(window.location.search);
            const token = urlParams.get('token');

            if (!token) {
                messageEl.style.color = 'var(--error)';
                messageEl.innerText = "Invalid or missing reset token! Please request a new link.";
                return;
            }

            try {
                const response = await fetch('/api/auth/reset-password-confirm', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token: token, new_password: newPassword })
                });

                const data = await response.json();

                if (response.ok) {
                    messageEl.style.color = 'var(--success)';
                    messageEl.innerText = "Password successfully reset! Taking you to login in 2 seconds...";
                    setTimeout(() => window.location.href = 'login.html', 2500);
                } else {
                    messageEl.style.color = 'var(--error)';
                    messageEl.innerText = data.error || 'Password reset failed.';
                }
            } catch (error) {
                messageEl.style.color = 'var(--error)';
                messageEl.innerText = 'Server error. Please try again later.';
            }
        });
    </script>
</body>

</html>
