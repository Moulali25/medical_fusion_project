<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedFuse - Login</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div class="navbar">
        <h1>MedFuse</h1>
    </div>

    <div class="auth-container">
        <div class="auth-card">
            <h2>Login</h2>
            <form onsubmit="login(event)">
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="email" class="form-input" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" class="form-input" required>
                    <a href="forgot_password.html"
                        style="display: block; text-align: right; margin-top: 8px; font-size: 0.85em; color: #4361ee; text-decoration: none; font-weight: 500;">Forgot
                        Password?</a>
                </div>
                <button type="submit" class="btn">Login</button>
            </form>
            <p id="message" style="margin-top: 1rem; color: red;"></p>
            <a href="register.html" class="auth-link">Don't have an account? Register</a>
        </div>
    </div>

    <script src="js/script.js"></script>
</body>

</html>
