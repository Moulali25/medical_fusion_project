<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedFuse - Forgot Password</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .back-link {
            text-align: center;
            display: block;
            margin-top: 15px;
            color: #6c757d;
            text-decoration: none;
            font-size: 0.9em;
        }

        .back-link:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>
    <div class="navbar">
        <h1>MedFuse</h1>
    </div>

    <div class="auth-container">
        <div class="auth-card">
            <h2>Reset Password</h2>
            <p style="text-align: center; color: #555; margin-bottom: 20px; font-size: 0.9em;">
                Enter your email address and we'll send you a link to reset your password.
            </p>
            <form onsubmit="resetPassword(event)">
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="reset-email" class="form-input" required>
                </div>
                <button type="submit" class="btn">Send Reset Link</button>
            </form>
            <p id="reset-message" style="margin-top: 1rem; text-align: center; font-weight: 500;"></p>

            <a href="login.html" class="back-link">Back to Login</a>
        </div>
    </div>

    <script>
        async function resetPassword(event) {
            event.preventDefault();
            const email = document.getElementById('reset-email').value;
            const messageEl = document.getElementById('reset-message');
            const submitBtn = document.querySelector('button[type="submit"]');

            if (!email) {
                messageEl.style.color = 'red';
                messageEl.textContent = 'Please enter a valid email address.';
                return;
            }

            // Disable button during req
            submitBtn.disabled = true;
            submitBtn.textContent = 'Processing...';

            try {
                const response = await fetch('/api/auth/reset-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: email })
                });

                const data = await response.json();

                if (response.ok) {
                    messageEl.style.color = 'var(--success)';
                    messageEl.innerHTML = `
                        ✔ Email successfully sent! 
                        <br><br>
                        <a href="inbox.html" style="background:#1e293b; color:white; padding:8px 12px; border-radius:6px; text-decoration:none; display:inline-block; font-size:0.9rem;">
                            📥 Open Local Mail Catcher
                        </a>
                    `;
                    document.getElementById('reset-email').value = '';
                } else {
                    messageEl.style.color = 'var(--error)';
                    messageEl.textContent = data.error || 'Failed to send email.';
                }
            } catch (err) {
                messageEl.style.color = 'red';
                messageEl.textContent = 'Could not securely connect to server.';
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Send Reset Link';
            }
        }
    </script>
</body>

</html>
